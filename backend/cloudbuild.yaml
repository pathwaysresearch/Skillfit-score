steps:
  # Download model artifacts from GCS before Docker build (credentials work here)
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'mkdir -p outputs && gsutil -m cp gs://skillfit-artifacts/* outputs/'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/gen-lang-client-0368862224/cloud-run-source-deploy/skillfit-score:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/gen-lang-client-0368862224/cloud-run-source-deploy/skillfit-score:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'skillfit-score'
      - '--platform=managed'
      - '--image=asia-south1-docker.pkg.dev/gen-lang-client-0368862224/cloud-run-source-deploy/skillfit-score:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--quiet'

images:
  - 'asia-south1-docker.pkg.dev/gen-lang-client-0368862224/cloud-run-source-deploy/skillfit-score:$COMMIT_SHA'

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY
