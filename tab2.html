<div class="tab-header fade-in">
    <div class="header-content">
        <h1>Inference Engine</h1>
        <p>Harness the Skill-Fit model to analyze job descriptions and predict occupational alignment.</p>
    </div>
</div>

<div class="inference-grid">
    <!-- Feature 1: The Comparator -->
    <div class="glass-panel feature-card comparator-card">
        <div class="card-header">
            <div class="icon-circle">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 3h5v5M4 20L20.2 3.8M21 16v5h-5M15 15l5.1 5.1M4 4l5 5"></path></svg>
            </div>
            <div>
                <h3>Skill Match Comparator</h3>
                <p class="small-text">Quantify the skill-gap between two roles</p>
            </div>
        </div>

        <div class="comparison-bridge">
            <div class="input-group">
                <label for="compareJob1">Job Description A</label>
                <textarea id="compareJob1" placeholder="Paste the source job description here..."></textarea>
            </div>
            
            <div class="vs-badge">VS</div>

            <div class="input-group">
                <label for="compareJob2">Job Description B</label>
                <textarea id="compareJob2" placeholder="Paste the target job description here..."></textarea>
            </div>
        </div>

        <div class="action-footer">
            <button class="btn-primary" onclick="compareTwoJobs()">
                <span>Analyze Match Compatibility</span>
            </button>
        </div>

        <div id="compareResult" class="comparison-result-card" style="display:none;">
            <div class="result-score-wrap">
                <div class="score-circle-container">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path id="scoreCirclePath" class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                    <div class="score-text">
                        <span id="matchPercent">0%</span>
                        <small>Fit Score</small>
                    </div>
                </div>
                <div class="score-info">
                    <h4 id="compatLabel"></h4>
                    <p id="compatDesc"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Feature 2: The Predictor -->
    <div class="glass-panel feature-card">
        <div class="card-header">
            <div class="icon-circle">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <div>
                <h3>Occupation Classifier</h3>
                <p class="small-text">Classify a job into its skill-based taxonomy</p>
            </div>
        </div>

        <div class="input-group full-height-input">
            <label for="jobQuery">Detailed Job Description</label>
            <textarea id="jobQuery" placeholder="e.g. Seeking a Lead Cloud Architect with experience in Terraform, AWS, and Kubernetes..."></textarea>
        </div>

        <button id="runInferenceBtn" class="btn-primary full-width" onclick="runInference()">
            <span>Generate Alignment Report</span>
        </button>
    </div>
</div>

<!-- Results Area -->
<div id="predictionResults" class="results-container" style="display:none;">
    <div class="glass-panel result-summary">
        <div class="panel-header">
            <h3>Inference Report</h3>
            <span class="status-badge">Live Prediction</span>
        </div>
        <div id="inferenceLoader" class="loader" style="display:none;"></div>
        <div id="inferenceOutput" class="output-box">
            <!-- Result items injected here -->
        </div>
    </div>
</div>
